name: Validate Registry

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate YAML syntax
        run: |
          python3 -c "
          import yaml, sys, pathlib
          errors = []
          for d in ['plugins', 'extensions']:
              for f in pathlib.Path(d).glob('*.yaml'):
                  try:
                      yaml.safe_load(f.read_text())
                  except yaml.YAMLError as e:
                      errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(e, file=sys.stderr)
              sys.exit(1)
          print('All YAML files are syntactically valid')
          "

      - name: Validate against schemas
        run: python3 scripts/build-index.py --registry-dir .

      - name: Check for duplicate IDs
        run: |
          python3 -c "
          import yaml, sys, pathlib
          ids = []
          for d in ['plugins', 'extensions']:
              for f in sorted(pathlib.Path(d).glob('*.yaml')):
                  data = yaml.safe_load(f.read_text())
                  if data and 'id' in data:
                      ids.append(data['id'])
          dupes = [x for x in ids if ids.count(x) > 1]
          if dupes:
              print(f'Duplicate IDs found: {set(dupes)}', file=sys.stderr)
              sys.exit(1)
          print(f'No duplicate IDs ({len(ids)} packages checked)')
          "

      - name: Check manifest URLs are reachable
        run: |
          FAILED=0
          for f in plugins/*.yaml extensions/*.yaml; do
            [ -f "$f" ] || continue
            [[ "$f" == *".gitkeep"* ]] && continue
            URL=$(python3 -c "import yaml; print(yaml.safe_load(open('$f'))['manifest_url'])" 2>/dev/null) || continue
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
            if [[ "$STATUS" == "200" ]]; then
              echo "  OK: $URL ($f)"
            else
              echo "  FAIL ($STATUS): $URL ($f)"
              FAILED=1
            fi
          done
          if [[ "$FAILED" == "1" ]]; then
            echo "Some manifest URLs are not reachable"
            exit 1
          fi
