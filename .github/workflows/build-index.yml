name: Build Index

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*.yaml'
      - 'extensions/*.yaml'
      - 'registry.yaml'
      - 'scripts/build-index.py'
      - 'schema/*.json'

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Build index.json
        run: python3 scripts/build-index.py --registry-dir .

      - name: Create PR if index changed
        id: pr
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          if git diff --cached --quiet; then
            echo "No changes to index.json"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH="chore/rebuild-index-$(date +%s)"
          git checkout -b "$BRANCH"
          git commit -m "chore: rebuild index.json"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: rebuild index.json" \
            --body "Auto-generated index rebuild triggered by package changes." \
            --base main \
            --head "$BRANCH")
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Satisfy required check
        if: steps.pr.outputs.created == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'validate',
              head_sha: '${{ steps.pr.outputs.head_sha }}',
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Index rebuild — validation skipped',
                summary: 'Source YAML was already validated before merge. Index is a computed artifact.'
              }
            });

      - name: Auto-merge
        if: steps.pr.outputs.created == 'true'
        run: gh pr merge --auto --squash --delete-branch "${{ steps.pr.outputs.branch }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
